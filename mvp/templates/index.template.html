<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>多页数据轮播 · 模板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0b0d; color: #f5f5f7; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; }
  #stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #0a0b0d; }

  /* 多 section 同处一个 DOM：clip 时段(data-start/data-duration)由框架层硬控可见性，
     GSAP opacity 仅做段内交叉淡入。--accent-rgb 由 render.mjs 按 hex 注入 */
  .scene { position: absolute; inset: 0; opacity: 0;
    background: radial-gradient(ellipse at 35% 45%, rgba(var(--accent-rgb), 0.13), transparent 62%), #0a0b0d; }
  .top-line { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); z-index: 60; }

  .inner { position: absolute; inset: 0; padding: 130px 150px; display: flex; flex-direction: column; justify-content: center; }
  .eyebrow { font-size: 24px; letter-spacing: 0.34em; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace; color: var(--accent); margin-bottom: 32px; }
  h1 { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; font-size: 104px; font-weight: 700;
    line-height: 1.05; letter-spacing: -2px; margin-bottom: 64px; }
  .kpis { display: flex; gap: 40px; }
  .kpi { flex: 0 0 auto; min-width: 360px; padding: 44px 48px; background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.08); border-top: 3px solid var(--accent); }
  .kpi .label { font-size: 18px; letter-spacing: 0.18em; color: rgba(245,245,247,0.5);
    font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-bottom: 20px; }
  .big-row { display: flex; align-items: baseline; gap: 14px; }
  .big { font-family: 'Space Grotesk', sans-serif; font-size: 200px; font-weight: 800; line-height: 0.9; letter-spacing: -6px; }
  .unit { font-family: 'Space Grotesk', sans-serif; font-size: 56px; font-weight: 500; color: var(--accent); }
  .desc { margin-top: 16px; font-size: 20px; color: rgba(245,245,247,0.6); font-weight: 300; }
  .hint { position: absolute; top: 44px; right: 150px; font-family: 'JetBrains Mono', monospace;
    font-size: 15px; letter-spacing: 0.2em; color: rgba(245,245,247,0.3); z-index: 50; }
</style>
</head>
<body>
<div id="stage" data-composition-id="root" data-start="0" data-duration="{{TOTAL_DUR}}" data-width="1920" data-height="1080">{{SECTIONS}}</div>
<script>
  // 通用数据驱动 timeline：render.mjs 注入 __PLAN，遍历 pages 构建（确定性，seek 正确）
  const PLAN = {{PLAN_JSON}};
  const main = gsap.timeline({ paused: true });

  PLAN.pages.forEach((pg, i) => {
    const sec = '#page' + i;
    const isLast = i === PLAN.pages.length - 1;

    // section 级显隐：set/to 显式（规避 seek 不复位）；clip 时段已由框架硬控
    // 页间 fadeIn/fadeOut 接力（不重叠）→ 声画同步，避免两句配音叠加
    if (i > 0) main.set(sec, { opacity: 0 }, 0);
    main.to(sec, { opacity: 1, duration: PLAN.fadeIn, ease: 'power2.out' }, pg.start);
    if (!isLast) main.to(sec, { opacity: 0, duration: PLAN.fadeOut, ease: 'power2.in' }, pg.start + pg.dur - PLAN.fadeOut);

    // 内容入场（页内时长由配音驱动）
    main.from(sec + ' .eyebrow', { opacity: 0, y: 16, duration: 0.3 }, pg.start + PLAN.fadeIn);
    main.from(sec + ' h1', { opacity: 0, y: 40, duration: 0.4, ease: 'power3.out' }, pg.start + PLAN.fadeIn + 0.05);
    pg.kpis.forEach((kpi, j) => {
      main.from(sec + ' .kpi:nth-child(' + (j + 1) + ')', { opacity: 0, y: 30, duration: 0.3, ease: 'power2.out' }, pg.start + PLAN.fadeIn + 0.2 + j * 0.15);
    });
  });

  window.__timelines = window.__timelines || {};
  window.__timelines["root"] = main;
</script>
</body>
</html>
